<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRCart</title>

  <!--
    ============================================================
    외부 라이브러리
    ============================================================
    jsQR (MIT License) - QR 코드 디코딩 라이브러리
    https://github.com/cozmo/jsQR
    상업적 이용 가능, 무료
    ============================================================
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

  <style>
    /* ============================================================
       CSS 변수 (디자인 토큰)
       색상, 간격 등 공통 값을 변수로 관리
    ============================================================ */
    :root {
      --color-accent:      #00e5a0; /* 메인 초록색 */
      --color-accent-bg:   #005f43; /* 초록 배경 (연한) */
      --color-bg:          #0a0a0f; /* 앱 전체 배경 */
      --color-surface:     #13131a; /* 헤더, 카드 배경 */
      --color-surface2:    #1c1c28; /* 아이템 배경 */
      --color-border:      #2a2a3a; /* 테두리 */
      --color-muted:       #666680; /* 보조 텍스트 */
      --color-text:        #f0f0f5; /* 기본 텍스트 */
      --color-danger:      #ff4d6d; /* 경고/삭제 */
    }

    /* 기본 리셋 */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }
    body {
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* 스크롤바 스타일 (웹킷 계열) */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }


    /* ============================================================
       헤더
    ============================================================ */
    #header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #logo {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--color-accent);
      letter-spacing: -0.02em;
    }
    #logo span { color: var(--color-text); }

    /* 탭 버튼 (스캔 / 카트) */
    #tabs { display: flex; gap: 4px; }
    .tab-btn {
      background: var(--color-surface2);
      color: var(--color-muted);
      border: none;
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: var(--color-accent);
      color: #000;
    }


    /* ============================================================
       탭 패널 공통
       .tab-panel: 기본적으로 숨김
       .tab-panel.active: 표시
    ============================================================ */
    .tab-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .tab-panel.active { display: flex; }


    /* ============================================================
       스캔 탭
    ============================================================ */
    #scanner-tab {
      padding: 14px 16px;
      gap: 12px;
      overflow-y: auto; /* 버튼 많을 때 스크롤 */
      align-items: stretch;
    }

    /* 상단 안내 텍스트 */
    .scan-hint { text-align: center; }
    .scan-hint-label {
      font-size: 0.72rem;
      color: var(--color-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .scan-hint-sub {
      font-size: 0.8rem;
      color: var(--color-muted);
      line-height: 1.5;
    }

    /* 2열 버튼 그리드 */
    .scan-btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* 스캔 버튼 공통 */
    .scan-btn {
      border: none;
      border-radius: 12px;
      padding: 16px 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .scan-btn:hover { opacity: 0.88; }
    .scan-btn .btn-icon { font-size: 1.8rem; }

    /* QR 버튼 (초록) */
    .scan-btn.primary   { background: var(--color-accent); color: #000; }
    /* 갤러리 버튼 (어두운) */
    .scan-btn.secondary { background: var(--color-surface2); color: var(--color-text); border: 1px solid var(--color-border); }
    /* 텍스트 버튼 (남색) */
    .scan-btn.text-btn  { background: #1a1a2e; color: var(--color-text); border: 1px solid #4a4a8a; }

    /* QR 인식 중 스피너 */
    #spinner { display: none; align-items: center; gap: 10px; color: var(--color-accent); font-size: 0.85rem; justify-content: center; }
    #spinner.show { display: flex; }
    .spin-ring {
      width: 16px; height: 16px;
      border: 2px solid var(--color-accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ============================================================
       카트 탭
    ============================================================ */
    #cart-header {
      padding: 11px 14px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #cart-count-label { font-weight: 700; font-size: 0.92rem; }
    #cart-count-label span { color: var(--color-accent); }

    #btn-clear-all {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    #btn-clear-all:hover { border-color: var(--color-danger); color: var(--color-danger); }

    /* 카트 아이템 목록 */
    #cart-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* 비어있을 때 안내 */
    #cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--color-muted);
      gap: 10px;
      opacity: 0.5;
    }
    #cart-empty .empty-icon { font-size: 2.5rem; }

    /* 카트 아이템 카드 */
    .cart-item {
      background: var(--color-surface2);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 11px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 아이템 순번 */
    .item-num {
      color: var(--color-accent);
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 22px;
      margin-top: 2px;
      opacity: 0.6;
    }

    /* 아이템 본문 */
    .item-body { flex: 1; min-width: 0; }

    /* 이미지 URL인 경우 미리보기 */
    .item-preview {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 7px;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }

    /* MODEL 타입 필드 테이블 */
    .item-fields { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
    .item-field  { display: flex; gap: 8px; font-size: 0.8rem; line-height: 1.5; }
    .field-label { color: var(--color-muted); min-width: 52px; font-size: 0.72rem; padding-top: 1px; }
    .field-value { color: var(--color-text); }
    .field-value.bold { font-weight: 700; }

    /* 일반 텍스트 */
    .item-text { font-size: 0.82rem; word-break: break-all; line-height: 1.5; }

    /* 타입 뱃지 + 시각 */
    .item-meta { font-size: 0.66rem; color: var(--color-muted); margin-top: 4px; display: flex; gap: 5px; align-items: center; }
    .type-badge { padding: 1px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: 700; }
    .badge-url, .badge-text, .badge-email, .badge-tel { background: var(--color-accent-bg); color: var(--color-accent); }
    .badge-image  { background: #003f8a; color: #60aaff; }
    .badge-model  { background: #2a1a4a; color: #c084fc; }

    /* 삭제 버튼 */
    .btn-delete {
      background: none; border: none;
      color: var(--color-muted);
      cursor: pointer; font-size: 1rem; padding: 2px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .btn-delete:hover { color: var(--color-danger); }

    /* 내보내기 영역 */
    #export-area {
      padding: 12px;
      border-top: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    #export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-export {
      background: var(--color-surface2);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      border-radius: 9px; padding: 11px;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-export:hover { border-color: var(--color-accent); color: var(--color-accent); }
    #btn-copy-all {
      background: var(--color-accent-bg);
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      border-radius: 9px; padding: 12px;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; font-family: inherit; width: 100%;
    }


    /* ============================================================
       실시간 QR 스캔 모달
       전체화면으로 카메라 표시, QR 인식 중 코너 프레임 + 스캔 라인
    ============================================================ */
    #qr-modal-overlay {
      position: fixed; inset: 0;
      background: #000;
      z-index: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; flex-direction: column;
    }
    #qr-modal-overlay.open { opacity: 1; pointer-events: all; }

    #qr-modal-header {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: rgba(0,0,0,0.8);
    }
    #qr-modal-header span { color: #fff; font-size: 0.9rem; font-weight: 700; }
    #btn-qr-close { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 4px; }

    #qr-video-wrap { flex: 1; position: relative; overflow: hidden; }
    #qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* QR 코너 프레임 */
    #qr-scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 220px; height: 220px;
    }
    .qr-corner { position: absolute; width: 24px; height: 24px; border-color: var(--color-accent); border-style: solid; }
    .qr-corner.tl { top: 0;    left: 0;    border-width: 3px 0 0 3px; }
    .qr-corner.tr { top: 0;    right: 0;   border-width: 3px 3px 0 0; }
    .qr-corner.bl { bottom: 0; left: 0;    border-width: 0 0 3px 3px; }
    .qr-corner.br { bottom: 0; right: 0;   border-width: 0 3px 3px 0; }

    /* 스캔 라인 애니메이션 */
    #qr-scan-line {
      position: absolute; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      animation: qrScan 2s ease-in-out infinite alternate;
      top: 0;
    }
    @keyframes qrScan { from { top: 0; } to { top: calc(100% - 2px); } }

    /* 인식 상태 메시지 */
    #qr-status {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #aaa; font-size: 0.78rem;
      padding: 6px 14px; border-radius: 20px; white-space: nowrap;
    }


    /* ============================================================
       텍스트 촬영 모달 (실시간 카메라로 찍고 이미지 보여주기)
    ============================================================ */
    #cam-modal-overlay {
      position: fixed; inset: 0;
      background: #000;
      z-index: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; flex-direction: column;
    }
    #cam-modal-overlay.open { opacity: 1; pointer-events: all; }

    #cam-header {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: rgba(0,0,0,0.8);
    }
    #cam-header span { color: #fff; font-size: 0.9rem; font-weight: 700; }
    #btn-cam-close { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 4px; }

    #cam-video-wrap { flex: 1; position: relative; overflow: hidden; }
    #cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* 하단 캡처/전환 버튼 */
    #cam-footer {
      padding: 20px 16px 32px;
      display: flex; align-items: center; justify-content: center; gap: 20px;
      background: rgba(0,0,0,0.8);
      flex-shrink: 0;
    }
    #btn-cam-capture {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--color-accent);
      border: 4px solid #fff;
      cursor: pointer; font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-cam-flip {
      background: rgba(255,255,255,0.2); border: none; color: #fff;
      border-radius: 50%; width: 44px; height: 44px;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }


    /* ============================================================
       텍스트 결과 모달 (캡처된 이미지 보여주고 복사→카트 담기)
    ============================================================ */
    #ocr-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 700; /* cam 모달보다 위에 */
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #ocr-modal-overlay.open { opacity: 1; pointer-events: all; }

    #ocr-modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px 20px 0 0;
      padding: 20px 18px 32px;
      width: 100%; max-height: 85vh;
      display: flex; flex-direction: column; gap: 12px;
      transform: translateY(40px);
      transition: transform 0.25s;
    }
    #ocr-modal-overlay.open #ocr-modal { transform: translateY(0); }

    #ocr-modal-title {
      font-weight: 700; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    #ocr-modal-hint { font-size: 0.75rem; color: var(--color-muted); line-height: 1.5; }

    /* 캡처된 이미지 */
    #ocr-preview-img {
      display: none;
      width: 100%; border-radius: 10px;
      flex: 1; object-fit: contain; min-height: 0;
    }

    /* 숨겨진 textarea (담기 버튼에서만 참조) */
    #ocr-textarea { display: none; }

    #ocr-modal-footer { display: flex; gap: 8px; flex-shrink: 0; }
    #btn-ocr-cancel {
      flex: 1; background: var(--color-surface2);
      border: 1px solid var(--color-border); color: var(--color-muted);
      border-radius: 10px; padding: 12px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #btn-ocr-add {
      flex: 2; background: var(--color-accent);
      border: none; color: #000;
      border-radius: 10px; padding: 12px;
      font-size: 0.88rem; font-weight: 800; cursor: pointer; font-family: inherit;
    }


    /* ============================================================
       토스트 알림 (화면 상단에 잠깐 표시)
    ============================================================ */
    #toast {
      position: fixed; top: 14px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      padding: 9px 20px; border-radius: 28px;
      font-size: 0.85rem; font-weight: 700;
      pointer-events: none;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 숨김 파일 input */
    .hidden-input { display: none; }
  </style>
</head>
<body>

  <!-- 숨김 요소들 (DOM에 있어야 하지만 화면에 안 보임) -->
  <canvas id="canvas" class="hidden-input"></canvas>
  <!-- QR 갤러리용 파일 선택 (여러 장 가능) -->
  <input id="file-input" type="file" accept="image/*" multiple class="hidden-input">
  <!-- 텍스트 갤러리용 파일 선택 -->
  <input id="ocr-file-input" type="file" accept="image/*" multiple class="hidden-input">


  <!-- ============================================================
       헤더
  ============================================================ -->
  <div id="header">
    <div id="logo">QR<span>CART</span></div>
    <div id="tabs">
      <button class="tab-btn active" data-tab="scanner">📷 스캔</button>
      <button class="tab-btn" data-tab="cart" id="cart-tab-btn">🛒 카트</button>
    </div>
  </div>


  <!-- ============================================================
       스캔 탭
  ============================================================ -->
  <div id="scanner-tab" class="tab-panel active">
    <div class="scan-hint">
      <div class="scan-hint-label">스캔 방법 선택</div>
      <div class="scan-hint-sub">카메라로 찍거나 갤러리에서 선택하세요</div>
    </div>

    <div class="scan-btn-grid">
      <!-- QR 실시간 스캔 -->
      <button class="scan-btn primary" id="btn-camera">
        <span class="btn-icon">📷</span>
        <span>QR 카메라</span>
      </button>
      <!-- QR 이미지 파일 선택 -->
      <button class="scan-btn secondary" id="btn-gallery">
        <span class="btn-icon">🖼️</span>
        <span>QR 갤러리</span>
      </button>
      <!-- 텍스트 실시간 촬영 -->
      <button class="scan-btn text-btn" id="btn-ocr-camera">
        <span class="btn-icon">🔤</span>
        <span>텍스트 촬영</span>
      </button>
      <!-- 텍스트 이미지 파일 선택 -->
      <button class="scan-btn text-btn" id="btn-ocr-gallery">
        <span class="btn-icon">📄</span>
        <span>텍스트 갤러리</span>
      </button>
    </div>

    <!-- QR 인식 중 표시 -->
    <div id="spinner">
      <div class="spin-ring"></div>
      QR 인식 중...
    </div>
  </div>


  <!-- ============================================================
       카트 탭
  ============================================================ -->
  <div id="cart-tab" class="tab-panel">
    <div id="cart-header">
      <div id="cart-count-label">담긴 항목 <span id="cart-count">0</span>개</div>
      <button id="btn-clear-all">전체 삭제</button>
    </div>

    <!-- 아이템 목록 (JS로 동적 렌더링) -->
    <div id="cart-list">
      <div id="cart-empty">
        <span class="empty-icon">🛒</span>
        <p>QR을 스캔하면 여기에 쌓여요</p>
      </div>
    </div>

    <!-- 내보내기 버튼들 -->
    <div id="export-area">
      <div id="export-row">
        <button class="btn-export" id="btn-csv">📄 CSV</button>
        <button class="btn-export" id="btn-txt">📝 TXT</button>
      </div>
      <button id="btn-copy-all">📋 전체 복사</button>
    </div>
  </div>


  <!-- ============================================================
       토스트 알림
  ============================================================ -->
  <div id="toast"></div>


  <!-- ============================================================
       실시간 QR 스캔 모달
       카메라 영상에서 매 프레임마다 jsQR로 QR 코드 감지
  ============================================================ -->
  <div id="qr-modal-overlay">
    <div id="qr-modal-header">
      <span>📷 QR 스캔</span>
      <button id="btn-qr-close">✕</button>
    </div>
    <div id="qr-video-wrap">
      <video id="qr-video" autoplay playsinline muted></video>
      <!-- QR 인식 영역 표시 프레임 -->
      <div id="qr-scan-frame">
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
        <div id="qr-scan-line"></div>
      </div>
      <div id="qr-status">스캔 중...</div>
    </div>
  </div>


  <!-- ============================================================
       텍스트 촬영 모달
       실시간 카메라로 보면서 📸 버튼으로 캡처
  ============================================================ -->
  <div id="cam-modal-overlay">
    <div id="cam-header">
      <span>🔤 텍스트 촬영</span>
      <button id="btn-cam-close">✕</button>
    </div>
    <div id="cam-video-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
    </div>
    <div id="cam-footer">
      <button id="btn-cam-flip">🔄</button>   <!-- 전/후면 카메라 전환 -->
      <button id="btn-cam-capture">📸</button> <!-- 캡처 버튼 -->
      <div style="width:44px"></div>           <!-- 레이아웃 균형용 빈 공간 -->
    </div>
  </div>


  <!-- ============================================================
       텍스트 결과 모달
       캡처된 이미지를 크게 보여주고,
       이미지에서 텍스트 선택→복사 후 "카트에 담기" 버튼 탭
  ============================================================ -->
  <div id="ocr-modal-overlay">
    <div id="ocr-modal">
      <div id="ocr-modal-title">
        <span>📝 텍스트 선택</span>
        <span id="btn-ocr-modal-close" style="cursor:pointer;font-size:1.2rem;">✕</span>
      </div>
      <div id="ocr-modal-hint">텍스트 선택 → 복사 후 아래 버튼 탭</div>
      <!-- 캡처된 이미지 (JS에서 src 설정) -->
      <img id="ocr-preview-img" alt="캡처 이미지">
      <!-- 숨겨진 textarea (값 참조용) -->
      <textarea id="ocr-textarea"></textarea>
      <div id="ocr-modal-footer">
        <button id="btn-ocr-cancel">닫기</button>
        <button id="btn-ocr-add">카트에 담기</button>
      </div>
    </div>
  </div>


  <script>
    /* ============================================================
       유틸리티 함수
    ============================================================ */

    /**
     * QR 텍스트 내용을 분석해서 타입 반환
     * IMAGE: 이미지 파일 URL (.jpg, .png 등)
     * URL:   일반 웹 주소 (http/https)
     * EMAIL: 이메일 (mailto:)
     * TEL:   전화번호 (tel:)
     * MODEL: 제품 정보 (KEY:VALUE|KEY:VALUE 또는 JSON)
     * TEXT:  그 외 일반 텍스트
     */
    function detectType(text) {
      if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i.test(text)) return 'IMAGE';
      if (/^https?:\/\//i.test(text))  return 'URL';
      if (/^mailto:/i.test(text))      return 'EMAIL';
      if (/^tel:/i.test(text))         return 'TEL';
      if (/^[A-Z]+:[^|]+(\|[A-Z]+:[^|]+)+$/.test(text)) return 'MODEL';
      try { JSON.parse(text); return 'MODEL'; } catch(e) {}
      return 'TEXT';
    }

    /**
     * MODEL 타입 데이터를 [[key, value], ...] 배열로 파싱
     * 지원 형식:
     *   1) KEY:VALUE|KEY:VALUE|...  (파이프 구분)
     *   2) {"key": "value", ...}    (JSON)
     */
    function parseModelData(text) {
      try {
        const obj = JSON.parse(text);
        if (typeof obj === 'object' && obj !== null) return Object.entries(obj);
      } catch(e) {}
      if (text.includes('|') && text.includes(':')) {
        return text.split('|').map(pair => {
          const i = pair.indexOf(':');
          return [pair.slice(0, i).trim(), pair.slice(i + 1).trim()];
        });
      }
      return null;
    }

    /**
     * MODEL 필드키 → 한국어 라벨 매핑
     * 목록에 없는 키는 원본 키 그대로 표시
     */
    const FIELD_LABELS = {
      MODEL: '모델명', COLOR: '색상',   PRICE: '가격', STOCK: '재고',
      DESC:  '설명',   NAME:  '이름',   SIZE:  '사이즈', BRAND: '브랜드',
      SKU:   'SKU',    WEIGHT:'무게',   MATERIAL: '소재',
    };

    /**
     * 파일명용 날짜+시간 문자열 반환
     * 예: "20260529-2030"
     */
    function dateStr() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    }


    /* ============================================================
       앱 상태
    ============================================================ */
    let items = []; // 카트에 담긴 아이템 배열: { id, text, type, time }


    /* ============================================================
       DOM 참조
       자주 쓰는 요소는 변수에 미리 저장
    ============================================================ */
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const fileInput   = document.getElementById('file-input');
    const ocrFileInput= document.getElementById('ocr-file-input');
    const spinner     = document.getElementById('spinner');
    const cartList    = document.getElementById('cart-list');
    const cartEmpty   = document.getElementById('cart-empty');
    const cartCountEl = document.getElementById('cart-count');
    const cartTabBtn  = document.getElementById('cart-tab-btn');
    const toastEl     = document.getElementById('toast');
    const ocrModalOverlay = document.getElementById('ocr-modal-overlay');
    const ocrTextarea     = document.getElementById('ocr-textarea');


    /* ============================================================
       탭 전환
       data-tab 속성 값에 맞는 패널을 active로 표시
    ============================================================ */
    document.getElementById('tabs').addEventListener('click', function(e) {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;

      const target = btn.dataset.tab;

      // 모든 탭 버튼 비활성화
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // 모든 패널 숨기고 해당 패널만 표시
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(target + '-tab').classList.add('active');
    });


    /* ============================================================
       토스트 알림
       msg: 표시할 메시지
       type: '' (초록/성공) | 'dup' (회색/중복) | 'err' (빨강/오류)
    ============================================================ */
    let toastTimer;
    function showToast(msg, type) {
      type = type || '';
      toastEl.textContent = msg;
      toastEl.style.background = type === 'err' ? '#ff4d6d' : type === 'dup' ? '#555' : '#00e5a0';
      toastEl.style.color      = type ? '#fff' : '#000';
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }


    /* ============================================================
       카트 렌더링
       items 배열을 기반으로 카트 목록을 DOM에 그림
    ============================================================ */
    function renderCart() {
      // 탭 버튼 텍스트 업데이트
      cartTabBtn.textContent = items.length ? `🛒 카트 (${items.length})` : '🛒 카트';
      cartCountEl.textContent = items.length;

      // 비어있으면 안내 메시지 표시
      if (items.length === 0) {
        cartList.innerHTML = '';
        cartList.appendChild(cartEmpty);
        return;
      }

      cartEmpty.remove();
      cartList.innerHTML = '';

      items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'cart-item';

        // 순번
        const num = document.createElement('div');
        num.className = 'item-num';
        num.textContent = `#${String(idx+1).padStart(2, '0')}`;

        // 본문
        const body = document.createElement('div');
        body.className = 'item-body';

        // IMAGE 타입: 이미지 미리보기
        if (item.type === 'IMAGE') {
          const img = document.createElement('img');
          img.src = item.text;
          img.alt = 'QR 이미지';
          img.className = 'item-preview';
          img.onerror = () => img.remove(); // 로드 실패 시 제거
          body.appendChild(img);
        }

        // MODEL 타입: 필드별 테이블로 표시
        if (item.type === 'MODEL') {
          const fields = parseModelData(item.text);
          if (fields) {
            const table = document.createElement('div');
            table.className = 'item-fields';
            fields.forEach(([k, v]) => {
              const row   = document.createElement('div'); row.className = 'item-field';
              const label = document.createElement('span'); label.className = 'field-label';
              label.textContent = FIELD_LABELS[k] || k;
              const val   = document.createElement('span');
              val.className = 'field-value' + (k === 'MODEL' || k === 'NAME' ? ' bold' : '');
              // PRICE 필드는 원 단위 포맷 적용
              val.textContent = k === 'PRICE' ? Number(v).toLocaleString('ko-KR') + '원' : v;
              row.appendChild(label); row.appendChild(val);
              table.appendChild(row);
            });
            body.appendChild(table);
          }
        }

        // 그 외 타입: 텍스트 그대로 표시
        if (item.type !== 'MODEL') {
          const text = document.createElement('div');
          text.className = 'item-text';
          text.textContent = item.text;
          body.appendChild(text);
        }

        // 타입 뱃지 + 스캔 시각
        const meta  = document.createElement('div'); meta.className = 'item-meta';
        const badge = document.createElement('span');
        badge.className = `type-badge badge-${item.type.toLowerCase()}`;
        badge.textContent = item.type;
        meta.appendChild(badge);
        meta.appendChild(document.createTextNode(item.time));
        body.appendChild(meta);

        // 개별 삭제 버튼
        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          items = items.filter(i => i.id !== item.id);
          renderCart();
        });

        div.appendChild(num);
        div.appendChild(body);
        div.appendChild(del);
        cartList.appendChild(div);
      });
    }


    /* ============================================================
       아이템 추가
       중복 텍스트는 추가하지 않음
    ============================================================ */
    function addItem(data) {
      const text = data.trim();
      if (!text) return;

      if (items.some(i => i.text === text)) {
        showToast('이미 담긴 항목이에요', 'dup');
        return;
      }

      items.push({
        id:   Date.now() + Math.random(), // 고유 ID
        text,
        type: detectType(text),
        time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
      });

      showToast('✅ 담겼어요!');
      renderCart();
    }


    /* ============================================================
       QR 이미지 파일 처리
       이미지를 캔버스에 그리고 jsQR로 QR 코드 디코딩
    ============================================================ */
    function processQRImage(file) {
      if (!file) return;
      spinner.classList.add('show');

      createImageBitmap(file).then(bitmap => {
        // 800px 이하로 리사이즈 (속도 향상, QR 인식에 충분)
        const MAX = 800;
        const scale = Math.min(1, MAX / Math.max(bitmap.width, bitmap.height));
        canvas.width  = Math.round(bitmap.width  * scale);
        canvas.height = Math.round(bitmap.height * scale);
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);

        // jsQR로 QR 코드 디코딩
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        spinner.classList.remove('show');

        if (code && code.data) addItem(code.data);
        else showToast('QR을 찾지 못했어요', 'err');

      }).catch(e => {
        spinner.classList.remove('show');
        showToast('인식 오류: ' + e.message, 'err');
      });
    }

    // QR 갤러리: 여러 장 선택 시 순차 처리
    function handleQRFiles(e) {
      Array.from(e.target.files || []).forEach(f => processQRImage(f));
      e.target.value = ''; // 같은 파일 재선택 가능하도록 초기화
    }
    fileInput.addEventListener('change', handleQRFiles);
    document.getElementById('btn-gallery').addEventListener('click', () => fileInput.click());


    /* ============================================================
       카트 버튼 이벤트
    ============================================================ */

    // 전체 삭제
    document.getElementById('btn-clear-all').addEventListener('click', () => {
      if (!items.length) return;
      if (confirm(`${items.length}개를 모두 삭제할까요?`)) {
        items = [];
        renderCart();
      }
    });

    // CSV 저장 (UTF-8 BOM 포함 → 엑셀에서 한글 깨짐 방지)
    document.getElementById('btn-csv').addEventListener('click', () => {
      if (!items.length) { showToast('담긴 항목이 없어요', 'dup'); return; }
      const rows = [
        ['번호', '내용', '타입', '시간'],
        ...items.map((it, i) => [i+1, `"${it.text.replace(/"/g, '""')}"`, it.type, it.time]),
      ];
      const blob = new Blob(['\uFEFF' + rows.map(r => r.join(',')).join('\n')], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `qr-${dateStr()}.csv`;
      a.click();
      showToast('CSV 저장됨');
    });

    // TXT 저장
    document.getElementById('btn-txt').addEventListener('click', () => {
      if (!items.length) { showToast('담긴 항목이 없어요', 'dup'); return; }
      const blob = new Blob([items.map((it, i) => `[${i+1}] ${it.text}`).join('\n')], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `qr-${dateStr()}.txt`;
      a.click();
      showToast('TXT 저장됨');
    });

    // 전체 클립보드 복사
    document.getElementById('btn-copy-all').addEventListener('click', async () => {
      if (!items.length) { showToast('담긴 항목이 없어요', 'dup'); return; }
      try {
        await navigator.clipboard.writeText(items.map((it, i) => `[${i+1}] ${it.text}`).join('\n'));
        showToast('📋 복사됐어요!');
      } catch(e) {
        showToast('복사 실패', 'err');
      }
    });


    /* ============================================================
       실시간 QR 스캔 모달
       getUserMedia로 카메라 스트림을 받아 매 프레임마다 jsQR 실행
       QR 코드 감지 시 자동으로 카트에 담고 2초 쿨다운
    ============================================================ */
    let qrStream   = null;  // 현재 카메라 스트림
    let qrScanning = false; // 스캔 루프 활성 여부
    let qrRaf      = null;  // requestAnimationFrame ID
    const qrVideo  = document.getElementById('qr-video');
    const qrCanvas = document.createElement('canvas');
    const qrCtx    = qrCanvas.getContext('2d');
    const qrStatus = document.getElementById('qr-status');
    let qrLastScan = ''; // 마지막 스캔된 텍스트 (중복 방지용)
    let qrLastTime = 0;  // 마지막 스캔 시각 (ms)

    function openQRModal() {
      document.getElementById('qr-modal-overlay').classList.add('open');
      // 후면 카메라로 스트림 시작
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } })
        .then(stream => {
          qrStream = stream;
          qrVideo.srcObject = stream;
          qrScanning = true;
          qrRaf = requestAnimationFrame(qrTick);
        })
        .catch(e => {
          showToast('카메라 오류: ' + e.message, 'err');
          closeQRModal();
        });
    }

    function closeQRModal() {
      qrScanning = false;
      if (qrRaf) cancelAnimationFrame(qrRaf);
      if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
      qrVideo.srcObject = null;
      document.getElementById('qr-modal-overlay').classList.remove('open');
    }

    // 매 프레임마다 실행되는 QR 스캔 루프
    function qrTick() {
      if (!qrScanning) return;

      if (qrVideo.readyState === qrVideo.HAVE_ENOUGH_DATA) {
        qrCanvas.width  = qrVideo.videoWidth;
        qrCanvas.height = qrVideo.videoHeight;
        qrCtx.drawImage(qrVideo, 0, 0);

        const code = jsQR(qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height).data, qrCanvas.width, qrCanvas.height);

        if (code && code.data) {
          const now = Date.now();
          // 같은 QR을 2초 이내에 중복 인식하지 않도록 쿨다운
          if (code.data !== qrLastScan || now - qrLastTime > 2000) {
            qrLastScan = code.data;
            qrLastTime = now;
            qrStatus.textContent = '✅ 인식됨!';
            qrStatus.style.color = '#00e5a0';
            addItem(code.data);
            // 0.8초 후 상태 메시지 원복
            setTimeout(() => {
              qrStatus.textContent = '스캔 중...';
              qrStatus.style.color = '#aaa';
            }, 800);
          }
        }
      }

      qrRaf = requestAnimationFrame(qrTick);
    }

    document.getElementById('btn-camera').addEventListener('click', openQRModal);
    document.getElementById('btn-qr-close').addEventListener('click', closeQRModal);


    /* ============================================================
       텍스트 촬영 모달 (실시간 카메라)
       캡처 버튼을 누르면 현재 프레임을 이미지로 저장하고
       텍스트 결과 모달로 전환
    ============================================================ */
    let camStream     = null; // 텍스트 촬영용 카메라 스트림
    let camFacingMode = 'environment'; // 기본: 후면 카메라
    const camVideo    = document.getElementById('cam-video');
    const camCanvas   = document.createElement('canvas');

    function openCamModal() {
      document.getElementById('cam-modal-overlay').classList.add('open');
      startCamStream();
    }

    function closeCamModal() {
      document.getElementById('cam-modal-overlay').classList.remove('open');
      stopCamStream();
    }

    function startCamStream() {
      if (camStream) stopCamStream();
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: camFacingMode, width: { ideal: 1280 } }
      }).then(stream => {
        camStream = stream;
        camVideo.srcObject = stream;
      }).catch(e => {
        showToast('카메라 오류: ' + e.message, 'err');
        closeCamModal();
      });
    }

    function stopCamStream() {
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
      camVideo.srcObject = null;
    }

    // 📸 캡처 버튼: 현재 프레임을 이미지로 저장 → 텍스트 결과 모달 오픈
    document.getElementById('btn-cam-capture').addEventListener('click', () => {
      if (!camVideo.videoWidth) { showToast('카메라 준비 중...', 'dup'); return; }

      camCanvas.width  = camVideo.videoWidth;
      camCanvas.height = camVideo.videoHeight;
      camCanvas.getContext('2d').drawImage(camVideo, 0, 0);

      // 캔버스를 dataURL(base64 이미지)로 변환
      const imgUrl = camCanvas.toDataURL('image/jpeg', 0.9);
      closeCamModal();
      openOCRModal(imgUrl); // 텍스트 결과 모달로 이미지 전달
    });

    // 🔄 전/후면 카메라 전환
    document.getElementById('btn-cam-flip').addEventListener('click', () => {
      camFacingMode = camFacingMode === 'environment' ? 'user' : 'environment';
      startCamStream();
    });

    document.getElementById('btn-cam-close').addEventListener('click', closeCamModal);
    document.getElementById('btn-ocr-camera').addEventListener('click', openCamModal);


    /* ============================================================
       텍스트 갤러리 처리
       갤러리에서 선택한 이미지를 텍스트 결과 모달로 전달
    ============================================================ */
    function handleOCRFiles(e) {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;

      // 첫 번째 파일만 처리 (여러 장 선택해도 첫 장만)
      const file = files[0];
      const reader = new FileReader();
      reader.onload = () => openOCRModal(reader.result);
      reader.readAsDataURL(file);

      e.target.value = '';
    }

    ocrFileInput.addEventListener('change', handleOCRFiles);
    document.getElementById('btn-ocr-gallery').addEventListener('click', () => ocrFileInput.click());


    /* ============================================================
       텍스트 결과 모달
       캡처된 이미지를 크게 보여주고,
       사용자가 이미지에서 텍스트 선택→복사 후
       "카트에 담기" 버튼을 누르면 클립보드 내용을 카트에 담음
    ============================================================ */
    function openOCRModal(imgUrl) {
      const previewImg = document.getElementById('ocr-preview-img');
      if (imgUrl) {
        previewImg.src = imgUrl;
        previewImg.style.display = 'block';
      } else {
        previewImg.style.display = 'none';
      }
      ocrModalOverlay.classList.add('open');
    }

    function closeOCRModal() {
      ocrModalOverlay.classList.remove('open');
      ocrTextarea.value = '';
    }

    document.getElementById('btn-ocr-modal-close').addEventListener('click', closeOCRModal);
    document.getElementById('btn-ocr-cancel').addEventListener('click', closeOCRModal);
    // 모달 바깥 탭 시 닫기
    ocrModalOverlay.addEventListener('click', e => {
      if (e.target === ocrModalOverlay) closeOCRModal();
    });

    // "카트에 담기" 버튼: 클립보드에서 텍스트 읽어서 카트에 추가
    document.getElementById('btn-ocr-add').addEventListener('click', () => {
      if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText()
          .then(text => {
            text = text.trim();
            if (text) {
              addItem(text);
              closeOCRModal();
            } else {
              showToast('복사된 텍스트가 없어요', 'dup');
            }
          })
          .catch(() => showToast('복사 후 다시 눌러봐요', 'err'));
      } else {
        showToast('클립보드 미지원 브라우저예요', 'err');
      }
    });


    /* ============================================================
       초기화
    ============================================================ */
    renderCart();

  </script>
</body>
</html>
